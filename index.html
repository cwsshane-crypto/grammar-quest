<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Quest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh;width:100vw}
#worldMap{position:relative;width:100%;height:100%;overflow:hidden;cursor:crosshair;background:#1a1a2e}
#mapCanvas{position:absolute;top:0;left:0;width:3200px;height:2400px;transition:transform 0.15s ease-out;transform-origin:0 0}
.tile{position:absolute;width:64px;height:32px}
.tile-grass{background:linear-gradient(135deg,#4a8c3f,#3a7d32);border:1px solid rgba(255,255,255,0.08)}
.tile-grass2{background:linear-gradient(135deg,#3f8a35,#35802c);border:1px solid rgba(255,255,255,0.08)}
.tile-path{background:linear-gradient(135deg,#c4a265,#b8963f);border:1px solid rgba(255,255,255,0.1)}
.tile-water{background:linear-gradient(135deg,#2980b9,#1a6da0);border:1px solid rgba(255,255,255,0.1)}
.tile-sand{background:linear-gradient(135deg,#d4a574,#c4955a);border:1px solid rgba(255,255,255,0.08)}
.tile-stone{background:linear-gradient(135deg,#7f8c8d,#6c7a7d);border:1px solid rgba(255,255,255,0.08)}
.tile-dirt{background:linear-gradient(135deg,#8b6914,#7a5c12);border:1px solid rgba(255,255,255,0.08)}
.tile-snow{background:linear-gradient(135deg,#ecf0f1,#d5dbdb);border:1px solid rgba(255,255,255,0.15)}
.iso-tile{clip-path:polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)}
.tree-3d{position:absolute;font-size:32px;filter:drop-shadow(2px 4px 3px rgba(0,0,0,0.4));z-index:3}
.building{position:absolute;font-size:36px;filter:drop-shadow(3px 5px 4px rgba(0,0,0,0.5));z-index:4}
.npc{position:absolute;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.2s;z-index:10;border:3px solid rgba(255,255,255,0.3);box-shadow:0 4px 8px rgba(0,0,0,0.4)}
.npc:hover{transform:scale(1.25);border-color:#ffd700}
.npc.answered{opacity:0.4;border-color:#666;filter:grayscale(0.8)}
.npc .npc-name{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;white-space:nowrap;color:#fff;text-shadow:0 1px 4px #000;background:rgba(0,0,0,0.7);padding:2px 8px;border-radius:10px}
#player{position:absolute;z-index:20;pointer-events:none;transition:left 0.15s ease-out,top 0.15s ease-out}
#player .char-sprite{position:relative;width:48px;height:48px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(2px 4px 4px rgba(0,0,0,0.5))}
#player .char-layer{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px}
#player .char-shadow{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:28px;height:10px;background:rgba(0,0,0,0.35);border-radius:50%;z-index:-1}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.walking .char-sprite{animation:bounce 0.3s ease-in-out infinite}
#clickIndicator{position:absolute;width:30px;height:30px;border:3px solid #ffd700;border-radius:50%;pointer-events:none;z-index:15;animation:pulse 0.6s ease-out forwards}
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(0.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);z-index:100;pointer-events:none}
#hud>*{pointer-events:auto}
.hud-group{display:flex;gap:12px;align-items:center}
.hud-item{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:20px;font-size:14px;font-weight:700}
.hud-item .icon{font-size:18px}
.btn{padding:10px 20px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn:hover{transform:scale(1.05)}
.btn-primary{background:linear-gradient(135deg,#7b2ff7,#00d2ff);color:#fff}
.btn-gold{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff}
.btn-danger{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff}
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,40,0.95);border:2px solid #7b2ff7;border-radius:20px;padding:24px;z-index:200;max-width:90vw;max-height:85vh;overflow-y:auto;display:none;box-shadow:0 0 40px rgba(123,47,247,0.3)}
.panel.show{display:block}
.panel-title{font-size:1.4em;font-weight:900;text-align:center;margin-bottom:16px;background:linear-gradient(135deg,#ffd700,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel-close{position:absolute;top:10px;right:14px;font-size:24px;cursor:pointer;color:#888}
.panel-close:hover{color:#fff}
#shopPanel{width:500px}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.shop-item{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s}
.shop-item:hover{border-color:#ffd700;background:rgba(255,215,0,0.1)}
.shop-item.owned{border-color:#27ae60;opacity:0.7}
.shop-item .item-icon{font-size:32px;margin-bottom:4px}
.shop-item .item-name{font-size:12px;font-weight:700;margin-bottom:2px}
.shop-item .item-price{font-size:11px;color:#ffd700}
.shop-item.owned .item-price{color:#2ecc71}
.shop-category{margin:16px 0 8px;font-size:1.1em;font-weight:700;color:#ffd700;border-bottom:1px solid rgba(255,215,0,0.2);padding-bottom:4px}
#inventoryPanel{width:500px}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.inv-item{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s}
.inv-item:hover{border-color:#00d2ff}
.inv-item.equipped{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.3)}
.inv-item .item-icon{font-size:28px}
.inv-item .item-name{font-size:10px;margin-top:2px}
#questionOverlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:150;display:none;align-items:center;justify-content:center}
#questionOverlay.show{display:flex}
#questionCard{background:rgba(20,20,40,0.97);border:2px solid #7b2ff7;border-radius:20px;padding:28px;width:520px;max-width:90vw}
.q-header{text-align:center;margin-bottom:12px}
.q-npc-icon{font-size:40px}
.q-npc-name{font-weight:700;color:#ffd700;margin-top:4px}
.q-text{font-size:1.15em;line-height:1.6;margin-bottom:16px;text-align:center}
.q-text .blank{display:inline-block;min-width:80px;border-bottom:3px solid #00d2ff;text-align:center;color:#00d2ff;font-weight:700}
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.q-option{padding:12px;border-radius:12px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#ddd;font-family:inherit;font-size:1em;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:left}
.q-option:hover:not(.disabled){border-color:#00d2ff;background:rgba(0,210,255,0.1)}
.q-option.correct{border-color:#2ecc71;background:rgba(46,204,113,0.15);color:#2ecc71}
.q-option.wrong{border-color:#e74c3c;background:rgba(231,76,60,0.15);color:#e74c3c}
.q-option.disabled{cursor:default;opacity:0.6}
.q-feedback{margin-top:14px;padding:14px;border-radius:12px;display:none}
.q-feedback.show{display:block}
.q-feedback.correct{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.3)}
.q-feedback.wrong{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3)}
.q-feedback .feedback-title{font-weight:700;font-size:1.05em}
.q-feedback .feedback-exp{margin-top:6px;color:#bbb;font-size:0.9em;line-height:1.4}
.q-coins-earned{text-align:center;margin-top:10px;font-size:1.1em;color:#ffd700;font-weight:700}
#bottomBar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:10px;padding:10px;background:linear-gradient(0deg,rgba(0,0,0,0.7),transparent);z-index:100}
#bottomBar .btn{padding:12px 24px;font-size:15px}
#startScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
#startScreen.hidden{display:none}
#startScreen .logo{font-size:5em;margin-bottom:10px}
#startScreen h1{font-size:2.5em;font-weight:900;background:linear-gradient(135deg,#ffd700,#ff6b6b,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
#startScreen .subtitle{color:#8899aa;font-size:1.1em;margin-bottom:30px;line-height:1.6}
#startScreen .start-btn{padding:18px 50px;border-radius:16px;border:none;background:linear-gradient(135deg,#7b2ff7,#00d2ff);color:white;font-family:inherit;font-size:1.3em;font-weight:700;cursor:pointer;transition:all 0.3s}
#startScreen .start-btn:hover{transform:scale(1.05);box-shadow:0 6px 25px rgba(123,47,247,0.5)}
.float-text{position:fixed;font-weight:900;font-size:1.5em;pointer-events:none;z-index:250;animation:floatUp 1.5s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.float-gold{color:#ffd700}
.float-red{color:#e74c3c}
#minimap{position:fixed;bottom:60px;right:10px;width:150px;height:112px;background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.2);border-radius:10px;z-index:90;overflow:hidden}
#minimapView{position:absolute;border:2px solid #ffd700;border-radius:2px}
#minimapPlayer{position:absolute;width:6px;height:6px;background:#00d2ff;border-radius:50%}
@media(max-width:600px){.shop-grid{grid-template-columns:repeat(2,1fr)}.inv-grid{grid-template-columns:repeat(3,1fr)}.q-options{grid-template-columns:1fr}#minimap{width:100px;height:75px}}
</style>
</head>

return unique.sort(function(){return Math.random()-0.5});
}
function getRegionAt(col,row){for(var i=0;i<REGIONS.length;i++){var r=REGIONS[i];if(col>=r.col&&col<r.col+r.w&&row>=r.row&&row<r.row+r.h)return r}return null}
function buildMap(){
var canvas=document.getElementById("mapCanvas");canvas.innerHTML="";
for(var row=0;row<MAP_ROWS;row++){for(var col=0;col<MAP_COLS;col++){
var pos=gridToScreen(col,row),tile=document.createElement("div");tile.className="tile iso-tile";
var tt="tile-grass",reg=getRegionAt(col,row);
if(reg){var types=TERRAIN[reg.type]||["tile-grass"];tt=types[(col+row)%types.length]}
else{var n=(col*7+row*13)%10;if(n<2)tt="tile-grass2";else if(n<3)tt="tile-path"}
tile.classList.add(tt);tile.style.left=pos.x+"px";tile.style.top=pos.y+"px";canvas.appendChild(tile);
}}
for(var i=0;i<30;i++){
var tc=2+Math.floor(Math.random()*46),tr=2+Math.floor(Math.random()*46),tp=gridToScreen(tc,tr);
var tree=document.createElement("div");tree.className="tree-3d";tree.style.left=(tp.x-16)+"px";tree.style.top=(tp.y-24)+"px";
tree.textContent=["&#x1F332;","&#x1F333;","&#x1F334;","&#x1F384;","&#x1F335;"][Math.floor(Math.random()*5)];canvas.appendChild(tree);
}
REGIONS.forEach(function(r){var p=gridToScreen(r.col,r.row),el=document.createElement("div");el.style.cssText="position:absolute;left:"+p.x+"px;top:"+p.y+"px;font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);pointer-events:none;white-space:nowrap";el.textContent=r.name;canvas.appendChild(el)});
placeNpcs();
}
function placeNpcs(){
var positions=[];state.npcs=[];
for(var i=0;i<15;i++){
var col,row,ok,att=0;
do{col=5+Math.floor(Math.random()*40);row=5+Math.floor(Math.random()*40);ok=true;
for(var j=0;j<positions.length;j++){if(Math.abs(col-positions[j].col)<4&&Math.abs(row-positions[j].row)<4){ok=false;break}}
if(Math.abs(col-25)<5&&Math.abs(row-20)<5)ok=false;att++;
}while(!ok&&att<50);
positions.push({col:col,row:row});
var ti=i%NPC_TYPES.length,nt=NPC_TYPES[ti];
var npc={id:i,col:col,row:row,type:nt,name:NPC_NAMES[nt]||"NPC",level:Math.ceil((i+1)/3),answered:false};
state.npcs.push(npc);
var pos=gridToScreen(col,row),el=document.createElement("div");el.className="npc";el.id="npc_"+i;
el.style.cssText="left:"+(pos.x-24)+"px;top:"+(pos.y-32)+"px;background:"+getNpcBg(npc.level);
el.innerHTML=npc.type+'<span class="npc-name">'+npc.name+' Lv.'+npc.level+'</span>';
el.onclick=function(e){e.stopPropagation();interactNpc(+this.id.split("_")[1])};
document.getElementById("mapCanvas").appendChild(el);
}
document.getElementById("totalNpcDisplay").textContent=15;
}
function getNpcBg(lv){var b=["#2c3e50","#8e44ad","#2980b9","#27ae60","#d35400","#c0392b"];return b[Math.min(lv-1,b.length-1)]}
function movePlayer(tc,tr){
tc=Math.max(1,Math.min(MAP_COLS-2,tc));tr=Math.max(1,Math.min(MAP_ROWS-2,tr));
state.playerCol=tc;state.playerRow=tr;
var pos=gridToScreen(tc,tr),p=document.getElementById("player");
p.style.left=(pos.x-24)+"px";p.style.top=(pos.y-32)+"px";
p.classList.add("walking");setTimeout(function(){p.classList.remove("walking")},400);
updateCamera();updateMinimap();checkNpcProximity();
}
function updateCamera(){
var wm=document.getElementById("worldMap"),vw=wm.clientWidth,vh=wm.clientHeight;
var pp=gridToScreen(state.playerCol,state.playerRow);
var cx=pp.x-vw/2,cy=pp.y-vh/2;
cx=Math.max(-400,Math.min(2800,cx));cy=Math.max(-200,Math.min(2000,cy));
document.getElementById("mapCanvas").style.transform="translate("+(-cx)+"px, "+(-cy)+"px)";
}
function updateMinimap(){
var sx=150/MAP_COLS,sy=112/MAP_ROWS;
document.getElementById("minimapView").style.cssText="left:"+(state.playerCol*sx-10)+"px;top:"+(state.playerRow*sy-10)+"px;width:20px;height:20px";
document.getElementById("minimapPlayer").style.cssText="left:"+(state.playerCol*sx-3)+"px;top:"+(state.playerRow*sy-3)+"px";
}
document.getElementById("worldMap").addEventListener("click",function(e){
var rect=document.getElementById("worldMap").getBoundingClientRect();
var cx=e.clientX-rect.left,cy=e.clientY-rect.top;
var wm=document.getElementById("worldMap"),vw=wm.clientWidth,vh=wm.clientHeight;
var pp=gridToScreen(state.playerCol,state.playerRow);
var camX=pp.x-vw/2,camY=pp.y-vh/2;
showClickIndicator(cx,cy);
var g=screenToGrid(cx+camX,cy+camY);movePlayer(g.col,g.row);
});
function showClickIndicator(x,y){
var el=document.createElement("div");el.id="clickIndicator";el.style.left=x+"px";el.style.top=y+"px";
document.getElementById("worldMap").appendChild(el);setTimeout(function(){el.remove()},600);
}
function checkNpcProximity(){
for(var i=0;i<state.npcs.length;i++){var n=state.npcs[i];if(n.answered)continue;if(Math.abs(state.playerCol-n.col)+Math.abs(state.playerRow-n.row)<3){interactNpc(n.id);break}}
}
function interactNpc(id){var n=state.npcs[id];if(!n||n.answered)return;state.currentNpc=n;var pool=allQuestions.length>0?allQuestions:generateQuestions();state.currentQuestion=pool[Math.floor(Math.random()*pool.length)];showQuestion()}
function showQuestion(){
var q=state.currentQuestion,n=state.currentNpc;if(!q||!n)return;
state.answered=false;
document.getElementById("qNpcIcon").textContent=n.type;
document.getElementById("qNpcName").textContent=n.name+" Lv."+n.level;
document.getElementById("qText").innerHTML=q.question.replace("___",'<span class="blank">___</span>');
var oe=document.getElementById("qOptions");oe.innerHTML="";
q.options.forEach(function(opt,i){var btn=document.createElement("button");btn.className="q-option";btn.textContent=String.fromCharCode(65+i)+". "+opt;btn.onclick=function(){checkAnswer(i)};oe.appendChild(btn)});
document.getElementById("qFeedback").className="q-feedback";document.getElementById("qCoinsEarned").textContent="";
document.getElementById("questionOverlay").classList.add("show");
}
function checkAnswer(idx){
var q=state.currentNpc&&state.currentQuestion,n=state.currentNpc;if(!q||!n)return;
if(state.answered)return;state.answered=true;
var ok=idx===q.answer;
document.querySelectorAll(".q-option").forEach(function(b,i){b.classList.add("disabled");b.onclick=null;if(i===q.answer)b.classList.add("correct");else if(i===idx&&!ok)b.classList.add("wrong")});
var fb=document.getElementById("qFeedback"),ft=document.getElementById("qFeedbackTitle"),fe=document.getElementById("qFeedbackExp"),ce=document.getElementById("qCoinsEarned");
if(ok){var coins=5+n.level*2,xp=10+n.level*5;state.coins+=coins;state.xp+=xp;state.score++;state.answered++;n.answered=true;state.answeredNpcs.add(n.id);fb.className="q-feedback show correct";ft.textContent="&#x2705; &#x7B54;&#x5C0D;&#x4E86;&#xFF01;";fe.textContent=q.explanation;ce.textContent="+"+coins+" &#x1FA99;  +"+xp+" &#x26A1; XP";var ne=document.getElementById("npc_"+n.id);if(ne)ne.classList.add("answered");showFloatText("+"+coins+" &#x1FA99;","gold");updateHud();if(state.answeredNpcs.size>=state.npcs.length){setTimeout(function(){showFloatText("&#x1F389; &#x5168;&#x90E8;&#x5B8C;&#x6210;&#xFF01;&#x65B0;&#x4E00;&#x8F2A;&#x958B;&#x59CB;&#xFF01;","gold");resetAllNpcs()},1500)}
}else{fb.className="q-feedback show wrong";ft.textContent="&#x274C; &#x7B54;&#x932F;&#x4E86;";fe.textContent=q.explanation;ce.textContent="";showFloatText("&#x518D;&#x8A66;&#x904E;&#xFF01;","red")}
setTimeout(function(){document.getElementById("questionOverlay").classList.remove("show");state.currentNpc=null;state.currentQuestion=null},2500);
}
function resetAllNpcs(){state.answeredNpcs.clear();state.answered=0;state.npcs=[];document.querySelectorAll(".npc").forEach(function(el){el.remove()});allQuestions=generateQuestions();placeNpcs();updateHud()}
function confirmReset(){if(confirm("&#x78BA;&#x5B9A;&#x8981;&#x91CD;&#x7F6E;&#x89D2;&#x8272;&#x55CE;&#xFF1F;\n\n&#x91D1;&#x5E63;&#x3001;&#x88DD;&#x5099;&#x3001;&#x9032;&#x5EA6;&#x90FD;&#x6703;&#x6E05;&#x9664;&#xFF01;"))resetGame()}
function resetGame(){
localStorage.removeItem("grammarQuestSave");
state.coins=0;state.xp=0;state.score=0;state.answered=0;state.playerCol=20;state.playerRow=15;
state.equipped={hat:"hat_0",body:"body_0",pants:"pants_0",shoes:"shoes_0",weapon:"weapon_0",cape:"cape_0"};
state.owned=["hat_0","body_0","pants_0","shoes_0","weapon_0","cape_0"];
state.answeredNpcs.clear();state.npcs=[];state.currentNpc=null;state.currentQuestion=null;
document.querySelectorAll(".npc").forEach(function(el){el.remove()});
document.getElementById("questionOverlay").classList.remove("show");
allQuestions=generateQuestions();buildMap();movePlayer(state.playerCol,state.playerRow);updateCharacterDisplay();updateHud();
showFloatText("&#x1F504; &#x89D2;&#x8272;&#x5DF2;&#x91CD;&#x7F6E;&#xFF01;","gold");
}
function openShop(){
var panel=document.getElementById("shopPanel"),content=document.getElementById("shopContent");
document.getElementById("shopCoins").textContent=state.coins;
var html="";var cats=[{key:"hat",name:"&#x1F9E2; &#x5E3D;&#x5B50;"},{key:"body",name:"&#x1F455; &#x4E0A;&#x8863;"},{key:"pants",name:"&#x1FA73; &#x8932;&#x5B50;"},{key:"shoes",name:"&#x1F45F; &#x978B;&#x5B50;"},{key:"weapon",name:"&#x2694;&#xFE0F; &#x6B66;&#x5668;"},{key:"cape",name:"&#x1F9E3; &#x62AB;&#x98A8;"}];
cats.forEach(function(cat){
html+='<div class="shop-category">'+cat.name+'</div><div class="shop-grid">';
EQUIPMENT[cat.key].forEach(function(item){
var owned=state.owned.includes(item.id);
html+='<div class="shop-item '+(owned?"owned":"")+'" onclick="buyItem(\''+cat.key+'\',\''+item.id+'\')"><div class="item-icon">'+(item.icon||"&#x2796;")+'</div><div class="item-name">'+item.name+'</div><div class="item-price">'+(owned?"&#x5DF2;&#x64C1;&#x6709;":item.price+" &#x1FA99;")+"</div></div>";
});html+="</div>";
});content.innerHTML=html;panel.classList.add("show");
}
function closeShop(){document.getElementById("shopPanel").classList.remove("show")}
function buyItem(cat,id){
if(state.owned.includes(id))return;
var item=EQUIPMENT[cat].find(function(i){return i.id===id});if(!item)return;
if(state.coins<item.price){alert("&#x91D1;&#x5E63;&#x4E0D;&#x8DB3;&#xFF01;");return}
state.coins-=item.price;state.owned.push(id);document.getElementById("shopCoins").textContent=state.coins;updateHud();
openShop();showFloatText("&#x8CB7;&#x5230; "+item.name+"&#xFF01;","gold");
}
function openInventory(){
var panel=document.getElementById("inventoryPanel"),content=document.getElementById("invContent");
var html="";var cats=[{key:"hat",name:"&#x1F9E2; &#x5E3D;&#x5B50;"},{key:"body",name:"&#x1F455; &#x4E0A;&#x8863;"},{key:"pants",name:"&#x1FA73; &#x8932;&#x5B50;"},{key:"shoes",name:"&#x1F45F; &#x978B;&#x5B50;"},{key:"weapon",name:"&#x2694;&#xFE0F; &#x6B66;&#x5668;"},{key:"cape",name:"&#x1F9E3; &#x62AB;&#x98A8;"}];
cats.forEach(function(cat){
html+='<div class="shop-category">'+cat.name+'</div><div class="inv-grid">';
EQUIPMENT[cat.key].forEach(function(item){
if(!state.owned.includes(item.id))return;
var eq=state.equipped[cat.key]===item.id;
html+='<div class="inv-item '+(eq?"equipped":"")+'" onclick="equipItem(\''+cat.key+'\',\''+item.id+'\')"><div class="item-icon">'+(item.icon||"&#x2796;")+'</div><div class="item-name">'+item.name+"</div></div>";
});html+="</div>";
});content.innerHTML=html;panel.classList.add("show");
}
function closeInventory(){document.getElementById("inventoryPanel").classList.remove("show")}
function equipItem(cat,id){if(!state.owned.includes(id))return;state.equipped[cat]=id;updateCharacterDisplay();openInventory()}
function updateCharacterDisplay(){
["hat","body","pants","shoes","weapon","cape"].forEach(function(layer){
var el=document.getElementById("char"+layer.charAt(0).toUpperCase()+layer.slice(1));if(!el)return;
var item=EQUIPMENT[layer].find(function(i){return i.id===state.equipped[layer]});
if(item&&item.icon){el.textContent=item.icon;el.style.display="flex"}else{el.textContent="";el.style.display="none"}
});
}
function updateHud(){
document.getElementById("coinDisplay").textContent=state.coins;
document.getElementById("xpDisplay").textContent=state.xp;
document.getElementById("scoreDisplay").textContent=state.score;
document.getElementById("answeredDisplay").textContent=state.answered;
}
function showFloatText(text,type){
var el=document.createElement("div");el.className="float-text float-"+type;el.textContent=text;
var pos=gridToScreen(state.playerCol,state.playerRow);
var wm=document.getElementById("worldMap"),vw=wm.clientWidth,vh=wm.clientHeight;
var cx=pos.x-vw/2,cy=pos.y-vh/2;
el.style.left=(pos.x-cx-30)+"px";el.style.top=(pos.y-cy-40)+"px";
document.getElementById("worldMap").appendChild(el);setTimeout(function(){el.remove()},1500);
}
function startGame(){
document.getElementById("startScreen").classList.add("hidden");
loadGame();allQuestions=generateQuestions();buildMap();
movePlayer(state.playerCol,state.playerRow);updateCharacterDisplay();updateHud();
setInterval(saveGame,30000);
}
function saveGame(){
var s={coins:state.coins,xp:state.xp,score:state.score,answered:state.answered,playerCol:state.playerCol,playerRow:state.playerRow,equipped:state.equipped,owned:state.owned,answeredNpcs:Array.from(state.answeredNpcs)};
localStorage.setItem("grammarQuestSave",JSON.stringify(s));
}
function loadGame(){
try{var s=JSON.parse(localStorage.getItem("grammarQuestSave"));if(s){
state.coins=s.coins||0;state.xp=s.xp||0;state.score=s.score||0;state.answered=s.answered||0;
state.playerCol=s.playerCol||20;state.playerRow=s.playerRow||15;
state.equipped=s.equipped||state.equipped;state.owned=s.owned||state.owned;
state.answeredNpcs=new Set(s.answeredNpcs||[]);
}}catch(e){}
}
allQuestions=generateQuestions();
</script>
</body>
</html>
