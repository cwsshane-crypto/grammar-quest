<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0a0e27;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.container{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 0 10px}
.header h1{font-size:2.2em;font-weight:900;background:linear-gradient(135deg,#00d2ff,#7b2ff7,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{color:#8899aa;margin-top:5px;font-size:1.1em}
.stats-bar{display:flex;justify-content:space-around;background:rgba(255,255,255,0.05);border-radius:16px;padding:15px;margin:20px 0;border:1px solid rgba(255,255,255,0.1)}
.stat{text-align:center}
.stat .num{font-size:1.8em;font-weight:900;color:#00d2ff}
.stat .label{font-size:0.8em;color:#8899aa}
.level-selector{display:flex;gap:10px;justify-content:center;margin:15px 0;flex-wrap:wrap}
.level-btn{padding:10px 22px;border-radius:12px;border:2px solid transparent;background:rgba(255,255,255,0.08);color:#ccc;font-family:inherit;font-weight:700;font-size:0.95em;cursor:pointer;transition:all 0.3s}
.level-btn:hover{background:rgba(255,255,255,0.15)}
.level-btn.active{border-color:#7b2ff7;background:rgba(123,47,247,0.2);color:#fff}
.category-selector{display:flex;gap:8px;justify-content:center;margin:10px 0 20px;flex-wrap:wrap}
.cat-btn{padding:6px 16px;border-radius:20px;border:none;background:rgba(255,255,255,0.06);color:#aaa;font-family:inherit;font-size:0.85em;cursor:pointer;transition:all 0.3s}
.cat-btn:hover{background:rgba(255,255,255,0.12)}
.cat-btn.active{background:#ff6b6b;color:#fff}
.xp-bar-container{background:rgba(255,255,255,0.08);border-radius:10px;height:12px;margin:10px 0;overflow:hidden}
.xp-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#ff6b6b,#ffd93d);transition:width 0.5s ease}
.xp-text{text-align:right;font-size:0.85em;color:#8899aa}
.progress-container{background:rgba(255,255,255,0.08);border-radius:10px;height:12px;margin:15px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#00d2ff,#7b2ff7);transition:width 0.5s ease}
.question-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:30px;margin:15px 0;animation:slideIn 0.4s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.question-number{color:#7b2ff7;font-weight:700;font-size:0.9em;margin-bottom:8px}
.question-text{font-size:1.25em;line-height:1.6;margin-bottom:20px}
.question-text .blank{display:inline-block;min-width:100px;border-bottom:3px solid #00d2ff;text-align:center;color:#00d2ff;font-weight:700;padding:0 8px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.option-btn{padding:14px 18px;border-radius:14px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#ddd;font-family:inherit;font-size:1em;font-weight:700;cursor:pointer;transition:all 0.3s;text-align:left}
.option-btn:hover:not(.disabled){border-color:#00d2ff;background:rgba(0,210,255,0.1);transform:scale(1.02)}
.option-btn.correct{border-color:#00e676;background:rgba(0,230,118,0.15);color:#00e676}
.option-btn.wrong{border-color:#ff5252;background:rgba(255,82,82,0.15);color:#ff5252}
.option-btn.disabled{cursor:default;opacity:0.6}
.option-btn.show-correct{border-color:#00e676;background:rgba(0,230,118,0.1);color:#00e676}
.feedback{margin-top:18px;padding:16px;border-radius:14px;display:none;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.feedback.show{display:block}
.feedback.correct{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3)}
.feedback.wrong{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3)}
.feedback .emoji{font-size:1.5em;margin-right:8px}
.feedback .title{font-weight:700;font-size:1.1em}
.feedback .explanation{margin-top:8px;color:#bbb;line-height:1.5}
.next-btn{display:block;width:100%;padding:16px;margin-top:18px;border-radius:14px;border:none;background:linear-gradient(135deg,#7b2ff7,#00d2ff);color:white;font-family:inherit;font-size:1.1em;font-weight:700;cursor:pointer;transition:all 0.3s}
.next-btn:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(123,47,247,0.4)}
.result-screen{text-align:center;padding:40px 20px;display:none}
.result-screen.show{display:block;animation:slideIn 0.5s ease}
.result-emoji{font-size:5em;margin-bottom:15px}
.result-title{font-size:2em;font-weight:900;margin-bottom:10px}
.result-stars{font-size:2.5em;margin:10px 0}
.result-score{font-size:3em;font-weight:900;color:#00d2ff}
.result-message{color:#aaa;margin:15px 0 25px;font-size:1.1em}
.start-screen{text-align:center;padding:40px 20px}
.start-screen h2{font-size:1.8em;margin-bottom:15px}
.start-screen p{color:#8899aa;margin-bottom:25px;line-height:1.6}
.start-btn,.retry-btn{padding:18px 50px;border-radius:16px;border:none;background:linear-gradient(135deg,#7b2ff7,#00d2ff);color:white;font-family:inherit;font-size:1.2em;font-weight:700;cursor:pointer;transition:all 0.3s}
.start-btn:hover,.retry-btn:hover{transform:scale(1.05);box-shadow:0 6px 25px rgba(123,47,247,0.5)}
.combo-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5em;font-weight:900;color:#ffd93d;text-shadow:0 0 30px rgba(255,217,61,0.5);pointer-events:none;opacity:0;z-index:100}
.combo-popup.show{animation:comboAnim 1s ease forwards}
@keyframes comboAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}
.hidden{display:none !important}
@media(max-width:500px){.header h1{font-size:1.6em}.options{grid-template-columns:1fr}.question-card{padding:20px}.stats-bar{padding:10px}.stat .num{font-size:1.4em}}
</style>
</head>

<script>
const starsEl=document.getElementById('stars');
for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s`;starsEl.appendChild(s)}

let allQuestions=[];
let state={level:0,category:'all',sessionQuestions:[],currentIndex:0,score:0,streak:0,bestStreak:0,xp:0,levelNum:1,answered:false,perSession:20};

,
    {level:3,category:"Tenses",question:"They ___ football yesterday.",options:["play","plays","played","playing"],answer:2,explanation:"'Yesterday' 表示過去，用過去式 played。"},
    {level:3,category:"Prepositions",question:"The cat is ___ the table.",options:["in","on","at","to"],answer:1,explanation:"在桌子上面用 on。"},
    {level:3,category:"Articles",question:"I saw ___ elephant at the zoo.",options:["a","an","the",""],answer:1,explanation:"Elephant 母音開頭，用 an。"},
    {level:3,category:"Plurals",question:"There are three ___ in the box.",options:["mouse","mouses","mice","mices"],answer:2,explanation:"Mouse 的複數是不規則變化 mice。"},
    {level:4,category:"Tenses",question:"She ___ her homework already.",options:["finish","finishes","has finished","finished"],answer:3,explanation:"'Already' 表示已經完成，用現在完成式 has finished。"},
    {level:4,category:"Prepositions",question:"We arrived ___ the airport at 9 a.m.",options:["in","on","at","to"],answer:2,explanation:"到達某個地點用 arrive at。"},
    {level:4,category:"Comparatives",question:"Tom is ___ than his brother.",options:["tall","taller","tallest","more tall"],answer:1,explanation:"兩個人的比較用比較級 taller。"},
    {level:4,category:"Conjunctions",question:"I like apples ___ oranges.",options:["and","but","or","so"],answer:0,explanation:"連接兩個喜歡的東西用 and。"},
    {level:4,category:"Pronouns",question:"___ is my best friend.",options:["He","Him","His","Himself"],answer:0,explanation:"當主詞用主格 He。"},
    {level:5,category:"Tenses",question:"If it ___ tomorrow, we will stay home.",options:["rain","rains","rained","will rain"],answer:1,explanation:"If 子句（條件句）用簡單現在式表示未來。"},
    {level:5,category:"Passive",question:"The letter ___ by my mother yesterday.",options:["writes","wrote","was written","written"],answer:2,explanation:"被動語態：受詞 + be + 過去分詞。過去式用 was written。"},
    {level:5,category:"Conditionals",question:"If I ___ a bird, I would fly to Japan.",options:["am","was","were","be"],answer:2,explanation:"與現在事實相反的假設，if 子句用 were（所有人稱）。"},
    {level:5,category:"Reported Speech",question:"She said that she ___ tired.",options:["is","was","were","be"],answer:1,explanation:"間接引述，時態要往回推，is → was。"},
    {level:5,category:"Modal Verbs",question:"You ___ wear a helmet when riding a bike.",options:["can","must","might","would"],answer:1,explanation:"表示必須、義務用 must。"},
    {level:6,category:"Tenses",question:"By the time we arrived, the film ___.",options:["started","has started","had started","starts"],answer:2,explanation:"過去的過去用過去完成式 had started。"},
    {level:6,category:"Passive",question:"The bridge ___ in 1998.",options:["builds","built","was built","is built"],answer:2,explanation:"被動語態過去式：was + 過去分詞。"},
    {level:6,category:"Conditionals",question:"If she ___ harder, she would have passed.",options:["studies","studied","had studied","has studied"],answer:2,explanation:"與過去事實相反，if 子句用過去完成式 had studied。"},
    {level:6,category:"Relative Clauses",question:"The boy ___ won the prize is my cousin.",options:["which","who","whom","whose"],answer:1,explanation:"修飾人（the boy）用 who。"},
    {level:6,category:"Inversion",question:"Never ___ such a beautiful sunset.",options:["I have seen","have I seen","I saw","did I saw"],answer:1,explanation:"Never 開頭要倒裝：Never + have + S + p.p."}
  ];
  // Generate more variations
  const subjects=["I","You","He","She","We","They","Tom","My mother","The children","The cat"];
  const verbs_simple=[["play","plays"],["eat","eats"],["go","goes"],["read","reads"],["write","writes"]];
  const verbs_past=[["play","played"],["eat","ate"],["go","went"],["read","read"],["write","wrote"]];
  const acts=["football","lunch","school","books","a letter"];
  const preps=["The cat is ___ the table.","The book is ___ the bag.","We arrived ___ the station.","I get up ___ 7 o'clock.","My birthday is ___ March."];
  const prep_ans=["on","in","at","at","in"];
  const prep_opts=[["in","on","at"],["in","on","at"],["in","on","at"],["in","on","at"],["in","on","at"]];
  
  for(let i=0;i<200;i++){
    const lv=i<50?3:i<100?4:i<150?5:6;
    if(i%4===0){
      const [v,vs]=verbs_simple[i%verbs_simple.length];
      const s=subjects[i%subjects.length];
      const a=acts[i%acts.length];
      if(s==="He"||s==="She"||s==="Tom"||s==="My mother"||s==="The cat"){
        samples.push({level:lv,category:"Tenses",question:`${s} ___ ${a} every day.`,options:[v,vs,v+"ing",v+"ed"],answer:options.indexOf(vs),explanation:"第三人稱單數，動詞加 s。"});
      } else {
        samples.push({level:lv,category:"Tenses",question:`${s} ___ ${a} every day.`,options:[v,vs,v+"ing",v+"ed"],answer:0,explanation:"複數主詞用原形動詞。"});
      }
    } else if(i%4===1){
      const [v,p]=verbs_past[i%verbs_past.length];
      const s=subjects[i%subjects.length];
      samples.push({level:lv,category:"Tenses",question:`${s} ___ yesterday.`,options:[v,p,p+"ing","is "+v+"ing"],answer:1,explanation:"過去式用 "+p+"。"});
    } else if(i%4===2){
      const idx=i%preps.length;
      samples.push({level:lv,category:"Prepositions",question:preps[idx],options:prep_opts[idx].concat(["to"]).slice(0,4),answer:prep_opts[idx].indexOf(prep_ans[idx]),explanation:"固定介詞用法。"});
    } else {
      samples.push({level:lv,category:"Articles",question:`I saw ___ ${["apple","elephant","book","orange","cat"][i%5]} at the ${["zoo","park","shop","school","library"][i%5]}.`,options:["a","an","the",""],answer:["an","an","a","an","a"][i%5]==="a"?0:1,explanation:"母音開頭用 an，子音開頭用 a。"});
    }
  }
  return samples;
}

function buildSelectors(){
  const levels=[3,4,5,6];
  const ls=document.getElementById('levelSelector');
  ls.innerHTML=levels.map(l=>`<button class="level-btn${state.level===l?' active':''}" onclick="selectLevel(${l})">P${l}</button>`).join('');
  
  const cats=['all',...new Set(allQuestions.map(q=>q.category).sort())];
  const cs=document.getElementById('categorySelector');
  cs.innerHTML=cats.map(c=>`<button class="cat-btn${state.category===c?' active':''}" onclick="selectCategory('${c}')">${c==='all'?'全部':c}</button>`).join('');
}

function startGame(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
  if(!state.level){
    const btns=document.querySelectorAll('.level-btn');
    if(btns.length) btns[0].click();
    else selectLevel(3);
  }
  filterQuestions();
  state.currentIndex=0;
  state.score=0;
  state.streak=0;
  state.bestStreak=0;
  showQuestion();
}

function filterQuestions(){
  let qs=allQuestions;
  if(state.level) qs=qs.filter(q=>q.level===state.level);
  if(state.category!=='all') qs=qs.filter(q=>q.category===state.category);
  state.sessionQuestions=qs.sort(()=>Math.random()-0.5).slice(0,state.perSession);
  if(state.sessionQuestions.length===0) state.sessionQuestions=allQuestions.slice(0,state.perSession);
}

function selectLevel(lv){
  state.level=lv;
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  resetGame();
}

function selectCategory(cat){
  state.category=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  resetGame();
}

function resetGame(){
  state.currentIndex=0;
  state.score=0;
  state.streak=0;
  state.bestStreak=0;
  filterQuestions();
  showQuestion();
}

function showQuestion(){
  const qs=state.sessionQuestions;
  if(state.currentIndex>=qs.length){showResults();return}
  const q=qs[state.currentIndex];
  state.answered=false;
  document.getElementById('questionNumber').textContent=`題目 ${state.currentIndex+1} / ${qs.length} · P${q.level} · ${q.category}`;
  document.getElementById('questionText').innerHTML=q.question.replace('___','<span class="blank">___</span>');
  const optsEl=document.getElementById('options');
  optsEl.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.textContent=`${String.fromCharCode(65+i)}. ${opt}`;
    btn.onclick=()=>checkAnswer(i,btn,q);
    optsEl.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('progressFill').style.width=`${(state.currentIndex/qs.length)*100}%`;
  document.getElementById('qNum').textContent=`${state.currentIndex+1}/${qs.length}`;
  document.getElementById('scoreDisplay').textContent=state.score;
  document.getElementById('streakDisplay').textContent=state.streak;
}

function checkAnswer(idx,btn,q){
  if(state.answered) return;
  state.answered=true;
  const opts=document.querySelectorAll('.option-btn');
  const isCorrect=idx===q.answer;
  opts.forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===q.answer) b.classList.add('show-correct');
  });
  const fb=document.getElementById('feedback');
  if(isCorrect){
    btn.classList.add('correct');
    state.score++;
    state.streak++;
    state.xp+=10+(state.streak>=3?5:0);
    if(state.streak>state.bestStreak) state.bestStreak=state.streak;
    document.getElementById('feedbackEmoji').textContent='🎉';
    document.getElementById('feedbackTitle').textContent='答對了！';
    fb.className='feedback show correct';
    if(state.streak>=3&&state.streak%3===0) showCombo(state.streak);
  }else{
    btn.classList.add('wrong');
    state.streak=0;
    document.getElementById('feedbackEmoji').textContent='😅';
    document.getElementById('feedbackTitle').textContent='唔啱喎，再試下！';
    fb.className='feedback show wrong';
  }
  document.getElementById('feedbackExplanation').textContent=q.explanation;
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('scoreDisplay').textContent=state.score;
  document.getElementById('streakDisplay').textContent=state.streak;
  document.getElementById('xpDisplay').textContent=state.xp;
  const xpNeeded=state.levelNum*100;
  if(state.xp>=xpNeeded){state.levelNum++;state.xp-=xpNeeded;}
  document.getElementById('xpText').textContent=`Level ${state.levelNum} — ${state.xp} / ${state.levelNum*100} XP`;
  document.getElementById('xpFill').style.width=`${(state.xp/(state.levelNum*100))*100}%`;
}

function showCombo(n){
  const el=document.getElementById('comboPopup');
  document.getElementById('comboCount').textContent=n;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function nextQuestion(){
  state.currentIndex++;
  showQuestion();
}

function showResults(){
  document.getElementById('gameScreen').classList.add('hidden');
  const rs=document.getElementById('resultScreen');
  rs.classList.add('show');
  const total=state.sessionQuestions.length;
  const pct=total>0?Math.round((state.score/total)*100):0;
  document.getElementById('resultScore').textContent=`${state.score}/${total}`;
  let emoji,stars,msg;
  if(pct>=90){emoji='🏆';stars='⭐⭐⭐';msg='太厲害了！你是 Grammar Hero！';}
  else if(pct>=70){emoji='🌟';stars='⭐⭐';msg='做得好！繼續努力！';}
  else if(pct>=50){emoji='👍';stars='⭐';msg='唔錯喎，再多練習就好喇！';}
  else{emoji='💪';stars='';msg='唔緊要，再試過就得喇！';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultStars').textContent=stars;
  document.getElementById('resultMessage').textContent=msg;
  document.getElementById('resultTitle').textContent=`最高連續 ${state.bestStreak} 題！`;
}

function restartGame(){
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('gameScreen').classList.remove('hidden');
  state.currentIndex=0;
  state.score=0;
  state.streak=0;
  state.bestStreak=0;
  state.xp=0;
  state.levelNum=1;
  filterQuestions();
  showQuestion();
}

loadQuestions();
</script>
</body>
</html>
