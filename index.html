<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 Grammar Quest — 奇幻文法大冒險</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh;width:100vw;touch-action:manipulation}

/* ===== WORLD MAP ===== */
#worldMap{position:relative;width:100%;height:100%;overflow:hidden;cursor:crosshair;background:#1a1a2e}
#mapCanvas{position:absolute;top:0;left:0;width:3200px;height:2400px;transition:transform 0.15s ease-out;transform-origin:0 0}

/* Isometric ground tiles */
.tile{position:absolute;width:64px;height:32px}
.tile-grass{background:linear-gradient(135deg,#4a8c3f,#3a7d32);border:1px solid rgba(255,255,255,0.08)}
.tile-grass2{background:linear-gradient(135deg,#3f8a35,#35802c);border:1px solid rgba(255,255,255,0.08)}
.tile-path{background:linear-gradient(135deg,#c4a265,#b8963f);border:1px solid rgba(255,255,255,0.1)}
.tile-water{background:linear-gradient(135deg,#2980b9,#1a6da0);border:1px solid rgba(255,255,255,0.1);animation:waterShimmer 3s ease-in-out infinite}
.tile-sand{background:linear-gradient(135deg,#d4a574,#c4955a);border:1px solid rgba(255,255,255,0.08)}
.tile-stone{background:linear-gradient(135deg,#7f8c8d,#6c7a7d);border:1px solid rgba(255,255,255,0.08)}
.tile-dirt{background:linear-gradient(135deg,#8b6914,#7a5c12);border:1px solid rgba(255,255,255,0.08)}
.tile-snow{background:linear-gradient(135deg,#ecf0f1,#d5dbdb);border:1px solid rgba(255,255,255,0.15)}
.tile-lava{background:linear-gradient(135deg,#e74c3c,#c0392b);border:1px solid rgba(255,255,255,0.1);animation:lavaGlow 2s ease-in-out infinite}
@keyframes waterShimmer{0%,100%{opacity:0.9}50%{opacity:1}}
@keyframes lavaGlow{0%,100%{box-shadow:0 0 8px rgba(231,76,60,0.4)}50%{box-shadow:0 0 16px rgba(231,76,60,0.7)}}

/* Isometric diamond shape */
.iso-tile{clip-path:polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)}

/* Map objects - 3D styled */
.map-object{position:absolute;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s;z-index:5}
.map-object:hover{transform:scale(1.2)}

/* Trees - 3D look */
.tree-3d{position:absolute;font-size:32px;filter:drop-shadow(2px 4px 3px rgba(0,0,0,0.4));z-index:3}
.tree-3d::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:20px;height:8px;background:rgba(0,0,0,0.3);border-radius:50%}

/* Buildings */
.building{position:absolute;display:flex;align-items:center;justify-content:center;font-size:36px;filter:drop-shadow(3px 5px 4px rgba(0,0,0,0.5));z-index:4}

/* NPC - 3D styled */
.npc{position:absolute;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:all 0.2s;z-index:10;border:3px solid rgba(255,255,255,0.3);box-shadow:0 4px 8px rgba(0,0,0,0.4),inset 0 -2px 4px rgba(0,0,0,0.2)}
.npc:hover{transform:scale(1.25);border-color:#ffd700;box-shadow:0 6px 16px rgba(255,215,0,0.3)}
.npc.answered{opacity:0.4;border-color:#666;filter:grayscale(0.8)}
.npc .npc-name{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;white-space:nowrap;color:#fff;text-shadow:0 1px 4px #000;background:rgba(0,0,0,0.7);padding:2px 8px;border-radius:10px;border:1px solid rgba(255,255,255,0.15)}

/* Player - 3D character */
#player{position:absolute;z-index:20;pointer-events:none;transition:left 0.15s ease-out,top 0.15s ease-out}
#player .char-sprite{position:relative;width:48px;height:48px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(2px 4px 4px rgba(0,0,0,0.5))}
#player .char-layer{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px}
#player .char-shadow{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:28px;height:10px;background:rgba(0,0,0,0.35);border-radius:50%;z-index:-1}

/* Player bounce animation */
@keyframes playerBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.walking .char-sprite{animation:playerBounce 0.3s ease-in-out infinite}

/* Click indicator */
#clickIndicator{position:absolute;width:30px;height:30px;border:3px solid #ffd700;border-radius:50%;pointer-events:none;z-index:15;animation:clickPulse 0.6s ease-out forwards}
@keyframes clickPulse{0%{transform:translate(-50%,-50%) scale(0.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);z-index:100;pointer-events:none}
#hud>*{pointer-events:auto}
.hud-group{display:flex;gap:12px;align-items:center}
.hud-item{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:20px;font-size:14px;font-weight:700}
.hud-item .icon{font-size:18px}

/* ===== BUTTONS ===== */
.btn{padding:10px 20px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn:hover{transform:scale(1.05)}
.btn-primary{background:linear-gradient(135deg,#7b2ff7,#00d2ff);color:#fff}
.btn-gold{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff}
.btn-green{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff}
.btn-danger{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px}

/* ===== PANELS ===== */
.panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,40,0.95);border:2px solid #7b2ff7;border-radius:20px;padding:24px;z-index:200;max-width:90vw;max-height:85vh;overflow-y:auto;display:none;box-shadow:0 0 40px rgba(123,47,247,0.3)}
.panel.show{display:block;animation:panelIn 0.3s ease}
@keyframes panelIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.panel-title{font-size:1.4em;font-weight:900;text-align:center;margin-bottom:16px;background:linear-gradient(135deg,#ffd700,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.panel-close{position:absolute;top:10px;right:14px;font-size:24px;cursor:pointer;color:#888}
.panel-close:hover{color:#fff}

/* ===== SHOP ===== */
#shopPanel{width:500px}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.shop-item{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.shop-item:hover{border-color:#ffd700;background:rgba(255,215,0,0.1)}
.shop-item.owned{border-color:#27ae60;opacity:0.7}
.shop-item.owned::after{content:'✓';position:absolute;top:4px;right:8px;color:#2ecc71;font-weight:900}
.shop-item .item-icon{font-size:32px;margin-bottom:4px}
.shop-item .item-name{font-size:12px;font-weight:700;margin-bottom:2px}
.shop-item .item-price{font-size:11px;color:#ffd700}
.shop-item.owned .item-price{color:#2ecc71}
.shop-category{margin:16px 0 8px;font-size:1.1em;font-weight:700;color:#ffd700;border-bottom:1px solid rgba(255,215,0,0.2);padding-bottom:4px}

/* ===== INVENTORY ===== */
#inventoryPanel{width:500px}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.inv-item{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.inv-item:hover{border-color:#00d2ff}
.inv-item.equipped{border-color:#ffd700;box-shadow:0 0 10px rgba(255,215,0,0.3)}
.inv-item.equipped::after{content:'E';position:absolute;top:2px;right:6px;font-size:10px;color:#ffd700;font-weight:900}
.inv-item .item-icon{font-size:28px}
.inv-item .item-name{font-size:10px;margin-top:2px}

/* ===== QUESTION OVERLAY ===== */
#questionOverlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:150;display:none;align-items:center;justify-content:center}
#questionOverlay.show{display:flex}
#questionCard{background:rgba(20,20,40,0.97);border:2px solid #7b2ff7;border-radius:20px;padding:28px;width:520px;max-width:90vw;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.q-header{text-align:center;margin-bottom:12px}
.q-npc-icon{font-size:40px}
.q-npc-name{font-weight:700;color:#ffd700;margin-top:4px}
.q-text{font-size:1.15em;line-height:1.6;margin-bottom:16px;text-align:center}
.q-text .blank{display:inline-block;min-width:80px;border-bottom:3px solid #00d2ff;text-align:center;color:#00d2ff;font-weight:700}
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.q-option{padding:12px;border-radius:12px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#ddd;font-family:inherit;font-size:1em;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:left}
.q-option:hover:not(.disabled){border-color:#00d2ff;background:rgba(0,210,255,0.1)}
.q-option.correct{border-color:#2ecc71;background:rgba(46,204,113,0.15);color:#2ecc71}
.q-option.wrong{border-color:#e74c3c;background:rgba(231,76,60,0.15);color:#e74c3c}
.q-option.disabled{cursor:default;opacity:0.6}
.q-feedback{margin-top:14px;padding:14px;border-radius:12px;display:none}
.q-feedback.show{display:block}
.q-feedback.correct{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.3)}
.q-feedback.wrong{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3)}
.q-feedback .feedback-title{font-weight:700;font-size:1.05em}
.q-feedback .feedback-exp{margin-top:6px;color:#bbb;font-size:0.9em;line-height:1.4}
.q-coins-earned{text-align:center;margin-top:10px;font-size:1.1em;color:#ffd700;font-weight:700}

/* ===== BOTTOM BAR ===== */
#bottomBar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:10px;padding:10px;background:linear-gradient(0deg,rgba(0,0,0,0.7),transparent);z-index:100}
#bottomBar .btn{padding:12px 24px;font-size:15px}

/* ===== START SCREEN ===== */
#startScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
#startScreen.hidden{display:none}
#startScreen .logo{font-size:5em;margin-bottom:10px}
#startScreen h1{font-size:2.5em;font-weight:900;background:linear-gradient(135deg,#ffd700,#ff6b6b,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
#startScreen .subtitle{color:#8899aa;font-size:1.1em;margin-bottom:30px;line-height:1.6}
#startScreen .start-btn{padding:18px 50px;border-radius:16px;border:none;background:linear-gradient(135deg,#7b2ff7,#00d2ff);color:white;font-family:inherit;font-size:1.3em;font-weight:700;cursor:pointer;transition:all 0.3s}
#startScreen .start-btn:hover{transform:scale(1.05);box-shadow:0 6px 25px rgba(123,47,247,0.5)}

/* ===== FLOATING TEXT ===== */
.float-text{position:fixed;font-weight:900;font-size:1.5em;pointer-events:none;z-index:250;animation:floatUp 1.5s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.float-gold{color:#ffd700}
.float-xp{color:#00d2ff}
.float-red{color:#e74c3c}

/* ===== MINIMAP ===== */
#minimap{position:fixed;bottom:60px;right:10px;width:150px;height:112px;background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.2);border-radius:10px;z-index:90;overflow:hidden}
#minimapView{position:absolute;border:2px solid #ffd700;border-radius:2px;pointer-events:none}
#minimapPlayer{position:absolute;width:6px;height:6px;background:#00d2ff;border-radius:50%;pointer-events:none}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .shop-grid{grid-template-columns:repeat(2,1fr)}
  .inv-grid{grid-template-columns:repeat(3,1fr)}
  .q-options{grid-template-columns:1fr}
  #minimap{width:100px;height:75px}
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
  <div class="logo">🏰</div>
  <h1>Grammar Quest</h1>
  <div class="subtitle">奇幻文法大冒險！<br>探索奇幻世界，挑戰 NPC 賺取金幣，<br>收集裝備，成為 Grammar Hero！</div>
  <button class="start-btn" onclick="startGame()">⚔️ 開始冒險</button>
</div>

<!-- WORLD MAP -->
<div id="worldMap">
  <div id="mapCanvas"></div>
  <!-- Player -->
  <div id="player">
    <div class="char-body">
      <div class="char-layer" id="charShadow"></div>
      <div class="char-layer" id="charPants">🩳</div>
      <div class="char-layer" id="charBody">👕</div>
      <div class="char-layer" id="charShoes">👟</div>
      <div class="char-layer" id="charHat">🧢</div>
      <div class="char-layer" id="charCape"></div>
      <div class="char-layer" id="charWeapon"></div>
      <div class="char-layer" id="charBase">🧙</div>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-group">
    <div class="hud-item"><span class="icon">🪙</span><span id="coinDisplay">0</span></div>
    <div class="hud-item"><span class="icon">⚡</span><span id="xpDisplay">0</span> XP</div>
    <div class="hud-item"><span class="icon">⭐</span><span id="scoreDisplay">0</span></div>
  </div>
  <div class="hud-group">
    <div class="hud-item"><span class="icon">📝</span><span id="answeredDisplay">0</span>/<span id="totalNpcDisplay">0</span></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottomBar">
  <button class="btn btn-gold" onclick="openShop()">🛒 商店</button>
  <button class="btn btn-primary" onclick="openInventory()">🎒 裝備</button>
  <button class="btn btn-danger" onclick="confirmReset()">🔄 重置</button>
</div>

<!-- MINIMAP -->
<div id="minimap">
  <div id="minimapView"></div>
  <div id="minimapPlayer"></div>
</div>

<!-- QUESTION OVERLAY -->
<div id="questionOverlay">
  <div id="questionCard">
    <div class="q-header">
      <div class="q-npc-icon" id="qNpcIcon">🧙</div>
      <div class="q-npc-name" id="qNpcName">智者</div>
    </div>
    <div class="q-text" id="qText"></div>
    <div class="q-options" id="qOptions"></div>
    <div class="q-feedback" id="qFeedback">
      <div class="feedback-title" id="qFeedbackTitle"></div>
      <div class="feedback-exp" id="qFeedbackExp"></div>
    </div>
    <div class="q-coins-earned" id="qCoinsEarned"></div>
  </div>
</div>

<!-- SHOP PANEL -->
<div id="shopPanel" class="panel">
  <span class="panel-close" onclick="closeShop()">✕</span>
  <div class="panel-title">🛒 裝備商店</div>
  <div style="text-align:center;margin-bottom:12px;color:#ffd700;font-weight:700">🪙 <span id="shopCoins">0</span> 金幣</div>
  <div id="shopContent"></div>
</div>

<!-- INVENTORY PANEL -->
<div id="inventoryPanel" class="panel">
  <span class="panel-close" onclick="closeInventory()">✕</span>
  <div class="panel-title">🎒 我的裝備</div>
  <div id="invContent"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================

const EQUIPMENT = {
  hat: [
    {id:'hat_0', name:'無', icon:'', price:0},
    {id:'hat_1', name:'布帽', icon:'🧢', price:10},
    {id:'hat_2', name:'皮帽', icon:'🎩', price:25},
    {id:'hat_3', name:'法師帽', icon:'🧙', price:50},
    {id:'hat_4', name:'皇冠', icon:'👑', price:100},
  ],
  body: [
    {id:'body_0', name:'無', icon:'', price:0},
    {id:'body_1', name:'布衣', icon:'👕', price:15},
    {id:'body_2', name:'皮甲', icon:'🦺', price:35},
    {id:'body_3', name:'鎖甲', icon:'🛡️', price:60},
    {id:'body_4', name:'龍鱗甲', icon:'🐉', price:120},
  ],
  pants: [
    {id:'pants_0', name:'無', icon:'', price:0},
    {id:'pants_1', name:'布褲', icon:'🩳', price:10},
    {id:'pants_2', name:'皮褲', icon:'👖', price:25},
    {id:'pants_3', name:'鎧褲', icon:'🦿', price:50},
    {id:'pants_4', name:'符文褲', icon:'✨', price:100},
  ],
  shoes: [
    {id:'shoes_0', name:'無', icon:'', price:0},
    {id:'shoes_1', name:'布鞋', icon:'👟', price:8},
    {id:'shoes_2', name:'皮靴', icon:'🥾', price:20},
    {id:'shoes_3', name:'鐵靴', icon:'🦶', price:40},
    {id:'shoes_4', name:'飛龍靴', icon:'🔥', price:80},
  ],
  weapon: [
    {id:'weapon_0', name:'無', icon:'', price:0},
    {id:'weapon_1', name:'木劍', icon:'🗡️', price:20},
    {id:'weapon_2', name:'鐵劍', icon:'⚔️', price:45},
    {id:'weapon_3', name:'法杖', icon:'🪄', price:70},
    {id:'weapon_4', name:'聖劍', icon:'🌟', price:150},
  ],
  cape: [
    {id:'cape_0', name:'無', icon:'', price:0},
    {id:'cape_1', name:'布披風', icon:'🧣', price:12},
    {id:'cape_2', name:'絲披風', icon:'🎀', price:30},
    {id:'cape_3', name:'魔法披風', icon:'🌙', price:55},
    {id:'cape_4', name:'龍翼披風', icon:'🦋', price:110},
  ],
};

const NPC_TYPES = ['🧙','🧝','🧛','🧚','🧜','🦹','👸','🤴','🧞','🧟','👹','👺','🐉','🦊','🐺'];

const NPC_NAMES = {
  '🧙':'智者','🧝':'精靈','🧛':'吸血鬼','🧚':'仙子','🧜':'海靈',
  '🦹':'英雄','👸':'公主','🤴':'王子','🧞':'燈神','🧟':'亡靈',
  '👹':'鬼王','👺':'妖怪','🐉':'龍','🦊':'狐仙','🐺':'狼王'
};

// Map regions
const REGIONS = [
  {name:'翡翠森林', col:0, row:0, w:12, h:10, type:'forest'},
  {name:'黃金草原', col:12, row:0, w:12, h:8, type:'grass'},
  {name:'藍寶石湖', col:24, row:0, w:14, h:10, type:'water'},
  {name:'石牙山脈', col:0, row:10, w:10, h:10, type:'mountain'},
  {name:'皇家城堡', col:10, row:8, w:14, h:12, type:'castle'},
  {name:'星光沙漠', col:24, row:10, w:16, h:8, type:'desert'},
  {name:'暗影沼澤', col:0, row:20, w:12, h:10, type:'swamp'},
  {name:'水晶洞穴', col:12, row:20, w:12, h:10, type:'cave'},
  {name:'雲端之城', col:24, row:18, w:16, h:12, type:'sky'},
];

// ============================================================
// STATE
// ============================================================

let state = {
  coins: 0,
  xp: 0,
  score: 0,
  answered: 0,
  playerCol: 20,
  playerRow: 15,
  equipped: {hat:'hat_0', body:'body_0', pants:'pants_0', shoes:'shoes_0', weapon:'weapon_0', cape:'cape_0'},
  owned: ['hat_0','body_0','pants_0','shoes_0','weapon_0','cape_0'],
  npcs: [],
  currentNpc: null,
  currentQuestion: null,
  answeredNpcs: new Set(),
};

let allQuestions = [];

// ============================================================
// QUESTIONS
// ============================================================

function generateQuestions() {
  const Q = [];
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  const shuffle = (arr) => { const a = [...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
  const randInt = (min,max) => Math.floor(Math.random()*(max-min+1))+min;

  // ===== EXPANDED DATA POOLS =====

      {q:"If I ___ you, I would accept the offer.", ans:"were", opts:["am","was","were","be"], exp:"與現在事實相反，if 子句用 were（所有人稱）。"},
      {q:"If they ___ earlier, they would have caught the train.", ans:"had left", opts:["left","had left","leave","have left"], exp:"與過去事實相反，if 子句用過去完成式 had left。"},
      {q:"If it rains, I ___ take an umbrella.", ans:"will", opts:["will","would","can","could"], exp:"第一類條件句，主要子句用 will + 原形動詞。"},
      {q:"If I had known, I ___ have told you.", ans:"would", opts:["will","would","could","should"], exp:"與過去事實相反，主要子句用 would have + 過去分詞。"},
    ];
    const t = pick(templates);
    const opts = shuffle(t.opts);
    const answer = opts.indexOf(t.ans);
    Q.push({level:pick([5,6]), category:"Conditionals", question:t.q, options:opts, answer, explanation:t.exp});
  }

  function addReportedSpeech() {
    const templates = [
      {q:"She said that she ___ tired.", ans:"was", opts:["is","was","were","be"], exp:"間接引述，時態往回推，is → was。"},
      {q:"He told me that he ___ the film.", ans:"had seen", opts:["saw","had seen","has seen","sees"], exp:"間接引述，過去式往回推為過去完成式。"},
      {q:"They said they ___ come the next day.", ans:"would", opts:["will","would","can","could"], exp:"間接引述，will → would。"},
      {q:"She asked me where I ___.", ans:"lived", opts:["live","lived","living","lives"], exp:"間接引述，現在式往回推為過去式。"},
      {q:"He said he ___ his homework already.", ans:"had finished", opts:["finished","had finished","has finished","finishes"], exp:"間接引述，現在完成式往回推為過去完成式。"},
      {q:"She said she ___ to the party.", ans:"was going", opts:["is going","was going","goes","went"], exp:"間接引述，現在進行式往回推為過去進行式。"},
    ];
    const t = pick(templates);
    const opts = shuffle(t.opts);
    const answer = opts.indexOf(t.ans);
    Q.push({level:pick([5,6]), category:"Reported Speech", question:t.q, options:opts, answer, explanation:t.exp});
  }

  function addRelativeClauses() {
    const templates = [
      {q:"The boy ___ won the prize is my cousin.", ans:"who", opts:["which","who","whom","whose"], exp:"修飾人（the boy）用 who。"},
      {q:"The book ___ I bought is interesting.", ans:"which", opts:["which","who","whom","whose"], exp:"修飾物（the book）用 which。"},
      {q:"The woman ___ lives next door is a doctor.", ans:"who", opts:["which","who","whom","whose"], exp:"修飾人用 who。"},
      {q:"The car ___ he drives is very fast.", ans:"which", opts:["which","who","whom","whose"], exp:"修飾物用 which。"},
      {q:"The girl ___ father is a teacher is my friend.", ans:"whose", opts:["which","who","whom","whose"], exp:"表示所有格用 whose。"},
      {q:"The house ___ we bought last year is big.", ans:"which", opts:["which","who","where","when"], exp:"修飾物用 which。"},
      {q:"The place ___ we met is a park.", ans:"where", opts:["which","who","where","when"], exp:"修飾地方用 where。"},
      {q:"The day ___ I met her was sunny.", ans:"when", opts:["which","who","where","when"], exp:"修飾時間用 when。"},
    ];
    const t = pick(templates);
    const opts = shuffle(t.opts);
    const answer = opts.indexOf(t.ans);
    Q.push({level:pick([5,6]), category:"Relative Clauses", question:t.q, options:opts, answer, explanation:t.exp});
  }

  function addInversion() {
    const templates = [
      {q:"Never ___ such a beautiful sunset.", ans:"have I seen", opts:["I have seen","have I seen","I saw","did I saw"], exp:"Never 開頭要倒裝：Never + have + S + p.p."},
      {q:"Not only ___ hard, but she is also kind.", ans:"does she work", opts:["she works","does she work","she work","working she"], exp:"Not only 開頭要倒裝。"},
      {q:"Hardly ___ the door when the phone rang.", ans:"had I opened", opts:["I had opened","had I opened","I opened","did I open"], exp:"Hardly 開頭要倒裝，用過去完成式。"},
      {q:"Only then ___ the truth.", ans:"did I understand", opts:["I understood","did I understand","I understand","understand I"], exp:"Only then 開頭要倒裝。"},
      {q:"Seldom ___ such a good opportunity.", ans:"do we have", opts:["we have","do we have","we had","had we"], exp:"Seldom 開頭要倒裝。"},
      {q:"No sooner ___ than it started to rain.", ans:"had we left", opts:["we had left","had we left","we left","did we leave"], exp:"No sooner 開頭要倒裝，用過去完成式。"},
    ];
    const t = pick(templates);
    const opts = shuffle(t.opts);
    const answer = opts.indexOf(t.ans);
    Q.push({level:6, category:"Inversion", question:t.q, options:opts, answer, explanation:t.exp});
  }

  function addPlurals() {
    const templates = [
      {q:"There are three ___ in the box.", ans:"mice", opts:["mouse","mouses","mice","mices"], exp:"Mouse 的複數是不規則變化 mice。"},
      {q:"The ___ are playing in the garden.", ans:"children", opts:["child","childs","children","childrens"], exp:"Child 的複數是 children。"},
      {q:"I saw two ___ at the zoo.", ans:"deer", opts:["deers","deer","deeres","deeries"], exp:"Deer 的單複數同形。"},
      {q:"The ___ are eating grass.", ans:"sheep", opts:["sheeps","sheep","sheepes","sheeplings"], exp:"Sheep 的單複數同形。"},
      {q:"There are many ___ in the pond.", ans:"fish", opts:["fishs","fish","fishes","fishies"], exp:"Fish 的複數通常係 fish。"},
      {q:"The ___ are running in the field.", ans:"geese", opts:["goose","gooses","geese","geeses"], exp:"Goose 的複數是 geese。"},
      {q:"I bought five ___ at the market.", ans:"tomatoes", opts:["tomato","tomatos","tomatoes","tomatose"], exp:"以 o 結尾的有生命名詞，複數加 es。"},
      {q:"The ___ are very tall.", ans:"men", opts:["man","mans","men","mens"], exp:"Man 的複數是 men。"},
      {q:"She has two ___.", ans:"teeth", opts:["tooths","teeth","tooth","teeths"], exp:"Tooth 的複數是 teeth。"},
      {q:"The ___ are flying south.", ans:"birds", opts:["bird","birds","birdes","birdies"], exp:"Bird 的複數係 birds（規則變化）。"},
    ];
    const t = pick(templates);
    const opts = shuffle(t.opts);
    const answer = opts.indexOf(t.ans);
    Q.push({level:pick([3,4]), category:"Plurals", question:t.q, options:opts, answer, explanation:t.exp});
  }

  function addSubjectVerb() {
    const templates = [
      {q:"The news ___ very interesting.", ans:"is", opts:["is","are","were","be"], exp:"News 係不可數名詞，用單數動詞 is。"},
      {q:"The police ___ looking for the thief.", ans:"are", opts:["is","are","was","has"], exp:"Police 係集合名詞，用複數動詞 are。"},
      {q:"Five dollars ___ enough.", ans:"is", opts:["is","are","were","have"], exp:"金額作為一個整體，用單數動詞。"},
      {q:"The team ___ playing well.", ans:"is", opts:["is","are","were","be"], exp:"Team 作為一個整體用單數動詞 is。"},
      {q:"My family ___ very large.", ans:"is", opts:["is","are","were","have"], exp:"Family 作為一個整體用單數動詞。"},
      {q:"The children ___ playing outside.", ans:"are", opts:["is","are","was","be"], exp:"Children 係複數，用 are。"},
      {q:"Every student ___ a textbook.", ans:"has", opts:["have","has","having","had"], exp:"Every + 名詞係單數，用 has。"},
      {q:"Neither Tom nor Mary ___ coming.", ans:"is", opts:["is","are","were","be"], exp:"Neither...nor 動詞同最近嘅主詞一致（Mary → is）。"},
    ];
    const t = pick(templates);
    const opts = shuffle(t.opts);
    const answer = opts.indexOf(t.ans);
    Q.push({level:pick([4,5,6]), category:"Subject-Verb Agreement", question:t.q, options:opts, answer, explanation:t.exp});
  }

  // ===== GENERATE LARGE POOL =====
  // Run each generator many times to build a huge pool
  const generators = [
    addSimplePresent, addSimplePast, addPresentContinuous, addPresentPerfect,
    addFutureWill, addGoingTo, addPastContinuous, addPresentPerfectCont, addPastPerfect,
    addPrepIn, addPrepOn, addPrepAt, addPrepMixed,
    addArticles, addArticlesThe,
    addComparative, addSuperlative,
    addPronouns, addConjunctions, addModals,
    addPassive, addConditionals, addReportedSpeech,
    addRelativeClauses, addInversion, addPlurals, addSubjectVerb,
  ];

  // Run each generator multiple times
  for(let round = 0; round < 8; round++) {
    generators.forEach(fn => fn());
  }

  // Deduplicate by question text
  const seen = new Set();
  const unique = [];
  for(const q of Q) {
    if(!seen.has(q.question)) {
      seen.add(q.question);
      unique.push(q);
    }
  }

  // Shuffle
  return unique.sort(() => Math.random() - 0.5);
}

// ============================================================
// ISOMETRIC MAP SYSTEM
// ============================================================

// Isometric constants
const TILE_W = 64;
const TILE_H = 32;
const MAP_COLS = 50;
const MAP_ROWS = 50;

// Convert grid coordinates to screen coordinates
function gridToScreen(col, row) {
  const x = (col - row) * (TILE_W / 2) + 1600; // offset to center
  const y = (col + row) * (TILE_H / 2) + 200;
  return { x, y };
}

// Convert screen coordinates to grid
function screenToGrid(sx, sy) {
  const x = sx - 1600;
  const y = sy - 200;
  const col = (x / (TILE_W / 2) + y / (TILE_H / 2)) / 2;
  const row = (y / (TILE_H / 2) - x / (TILE_W / 2)) / 2;
  return { col: Math.floor(col), row: Math.floor(row) };
}

// Map terrain types per region
const TERRAIN = {
  forest: ['tile-grass','tile-grass2'],
  grass: ['tile-grass','tile-grass2'],
  water: ['tile-water'],
  mountain: ['tile-stone','tile-stone'],
  castle: ['tile-stone','tile-path'],
  desert: ['tile-sand','tile-sand'],
  swamp: ['tile-dirt','tile-grass'],
  cave: ['tile-stone','tile-dirt'],
  sky: ['tile-snow','tile-grass'],
};

function buildMap() {
  const canvas = document.getElementById('mapCanvas');
  canvas.innerHTML = '';

  // Draw isometric ground tiles
  for(let row = 0; row < MAP_ROWS; row++) {
    for(let col = 0; col < MAP_COLS; col++) {
      const pos = gridToScreen(col, row);
      const tile = document.createElement('div');
      tile.className = 'tile iso-tile';

      // Determine terrain based on position
      let terrainType = 'tile-grass';
      const region = getRegionAt(col, row);
      if(region) {
        const types = TERRAIN[region.type] || ['tile-grass'];
        terrainType = types[(col + row) % types.length];
      } else {
        // Add variety
        const noise = (col * 7 + row * 13) % 10;
        if(noise < 2) terrainType = 'tile-grass2';
        else if(noise < 3) terrainType = 'tile-path';
      }

      tile.classList.add(terrainType);
      tile.style.left = pos.x + 'px';
      tile.style.top = pos.y + 'px';
      tile.dataset.col = col;
      tile.dataset.row = row;
      canvas.appendChild(tile);
    }
  }

  // Draw decorations
  drawDecorations(canvas);

  // Draw region labels
  REGIONS.forEach(r => {
    const pos = gridToScreen(r.col, r.row);
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:${pos.x}px;top:${pos.y}px;font-size:14px;font-weight:700;color:rgba(255,255,255,0.5);pointer-events:none;text-shadow:0 1px 4px #000;white-space:nowrap`;
    el.textContent = r.name;
    canvas.appendChild(el);
  });

  // Place NPCs
  placeNpcs();
}

function getRegionAt(col, row) {
  for(const r of REGIONS) {
    if(col >= r.col && col < r.col + r.w && row >= r.row && row < r.row + r.h) {
      return r;
    }
  }
  return null;
}

function drawDecorations(canvas) {
  // Trees
  const treePositions = [
    {col:5,row:8},{col:8,row:5},{col:12,row:3},{col:3,row:12},{col:7,row:10},
    {col:2,row:15},{col:15,row:2},{col:10,row:7},{col:6,row:14},{col:14,row:6},
    {col:1,row:20},{col:20,row:1},{col:8,row:18},{col:18,row:8},{col:4,row:22},
    {col:22,row:4},{col:11,row:15},{col:15,row:11},{col:3,row:25},{col:25,row:3},
    {col:13,row:13},{col:7,row:20},{col:20,row:7},{col:9,row:22},{col:22,row:9},
    {col:16,row:16},{col:2,row:28},{col:28,row:2},{col:12,row:20},{col:20,row:12},
  ];
  treePositions.forEach(p => {
    const pos = gridToScreen(p.col, p.row);
    const tree = document.createElement('div');
    tree.className = 'tree-3d';
    tree.style.left = (pos.x - 16) + 'px';
    tree.style.top = (pos.y - 24) + 'px';
    tree.textContent = ['🌲','🌳','🌴','🎄','🌵'][Math.floor(Math.random()*5)];
    canvas.appendChild(tree);
  });

  // Buildings
  const buildings = [
    {col:25,row:20,icon:'🏰'},{col:22,row:18,icon:'🏯'},{col:28,row:22,icon:'⛪'},
    {col:10,row:15,icon:'🏠'},{col:15,row:10,icon:'🏡'},{col:35,row:15,icon:'🏔️'},
    {col:40,row:30,icon:'🏰'},{col:5,row:35,icon:'🌋'},{col:30,row:40,icon:'🏰'},
  ];
  buildings.forEach(b => {
    const pos = gridToScreen(b.col, b.row);
    const el = document.createElement('div');
    el.className = 'building';
    el.style.left = (pos.x - 18) + 'px';
    el.style.top = (pos.y - 30) + 'px';
    el.textContent = b.icon;
    canvas.appendChild(el);
  });

  // Rocks
  for(let i=0;i<20;i++) {
    const col = 2 + Math.floor(Math.random() * 46);
    const row = 2 + Math.floor(Math.random() * 46);
    const pos = gridToScreen(col, row);
    const rock = document.createElement('div');
    rock.className = 'map-object';
    rock.style.left = (pos.x - 12) + 'px';
    rock.style.top = (pos.y - 10) + 'px';
    rock.style.fontSize = '18px';
    rock.textContent = ['🪨','💎','⭐','🌸','🍄'][Math.floor(Math.random()*5)];
    canvas.appendChild(rock);
  }
}

function placeNpcs() {
  const npcCount = 15;
  const positions = [];

  for(let i = 0; i < npcCount; i++) {
    let col, row, valid;
    let attempts = 0;
    do {
      col = 5 + Math.floor(Math.random() * 40);
      row = 5 + Math.floor(Math.random() * 40);
      valid = true;
      for(const p of positions) {
        if(Math.abs(col - p.col) < 4 && Math.abs(row - p.row) < 4) {
          valid = false;
          break;
        }
      }
      // Not too close to player start (25, 20)
      if(Math.abs(col - 25) < 5 && Math.abs(row - 20) < 5) valid = false;
      attempts++;
    } while(!valid && attempts < 50);

    positions.push({col, row});

    const typeIdx = i % NPC_TYPES.length;
    const npcType = NPC_TYPES[typeIdx];
    const npc = {
      id: i,
      col, row,
      type: npcType,
      name: NPC_NAMES[npcType] || '神秘人',
      level: Math.ceil((i+1) / 3),
      answered: false,
    };
    state.npcs.push(npc);

    const pos = gridToScreen(col, row);
    const el = document.createElement('div');
    el.className = 'npc';
    el.id = `npc_${i}`;
    el.style.cssText = `left:${pos.x - 24}px;top:${pos.y - 32}px;background:${getNpcBg(npc.level)}`;
    el.innerHTML = `${npc.type}<span class="npc-name">${npc.name} Lv.${npc.level}</span>`;
    el.onclick = (e) => { e.stopPropagation(); interactNpc(i); };
    document.getElementById('mapCanvas').appendChild(el);
  }

  document.getElementById('totalNpcDisplay').textContent = npcCount;
}

function getNpcBg(level) {
  const bgs = ['#2c3e50','#8e44ad','#2980b9','#27ae60','#d35400','#c0392b'];
  return bgs[Math.min(level-1, bgs.length-1)];
}
// ============================================================
// PLAYER MOVEMENT
// ============================================================

function movePlayer(targetCol, targetRow) {
  targetCol = Math.max(1, Math.min(MAP_COLS - 2, targetCol));
  targetRow = Math.max(1, Math.min(MAP_ROWS - 2, targetRow));
  state.playerCol = targetCol;
  state.playerRow = targetRow;
  const pos = gridToScreen(targetCol, targetRow);
  const player = document.getElementById('player');
  player.style.left = (pos.x - 24) + 'px';
  player.style.top = (pos.y - 32) + 'px';
  player.classList.add('walking');
  setTimeout(() => player.classList.remove('walking'), 400);
  updateCamera();
  updateMinimap();
  checkNpcProximity();
}

function updateCamera() {
  const worldMap = document.getElementById('worldMap');
  const vw = worldMap.clientWidth;
  const vh = worldMap.clientHeight;
  const playerPos = gridToScreen(state.playerCol, state.playerRow);
  let camX = playerPos.x - vw / 2;
  let camY = playerPos.y - vh / 2;
  camX = Math.max(-400, Math.min(2800, camX));
  camY = Math.max(-200, Math.min(2000, camY));
  document.getElementById('mapCanvas').style.transform = 'translate(' + (-camX) + 'px, ' + (-camY) + 'px)';
}

function updateMinimap() {
  const mmW = 150, mmH = 112;
  const scaleX = mmW / MAP_COLS;
  const scaleY = mmH / MAP_ROWS;
  document.getElementById('minimapView').style.cssText = 'left:' + (state.playerCol * scaleX - 10) + 'px;top:' + (state.playerRow * scaleY - 10) + 'px;width:20px;height:20px';
  document.getElementById('minimapPlayer').style.cssText = 'left:' + (state.playerCol * scaleX - 3) + 'px;top:' + (state.playerRow * scaleY - 3) + 'px';
}

// Click to move
document.getElementById('worldMap').addEventListener('click', function(e) {
  var rect = document.getElementById('worldMap').getBoundingClientRect();
  var clickX = e.clientX - rect.left;
  var clickY = e.clientY - rect.top;
  var worldMapEl = document.getElementById('worldMap');
  var vw = worldMapEl.clientWidth;
  var vh = worldMapEl.clientHeight;
  var playerPos = gridToScreen(state.playerCol, state.playerRow);
  var camX = playerPos.x - vw / 2;
  var camY = playerPos.y - vh / 2;
  var worldX = clickX + camX;
  var worldY = clickY + camY;
  showClickIndicator(clickX, clickY);
  var grid = screenToGrid(worldX, worldY);
  movePlayer(grid.col, grid.row);
});

function showClickIndicator(x, y) {
  var indicator = document.createElement('div');
  indicator.id = 'clickIndicator';
  indicator.style.left = x + 'px';
  indicator.style.top = y + 'px';
  document.getElementById('worldMap').appendChild(indicator);
  setTimeout(function() { indicator.remove(); }, 600);
}

// ============================================================
// NPC INTERACTION
// ============================================================

function checkNpcProximity() {
  for(var i = 0; i < state.npcs.length; i++) {
    var npc = state.npcs[i];
    if(npc.answered) continue;
    var dist = Math.abs(state.playerCol - npc.col) + Math.abs(state.playerRow - npc.row);
    if(dist < 3) {
      interactNpc(npc.id);
      break;
    }
  }
}

function interactNpc(npcId) {
  var npc = state.npcs[npcId];
  if(!npc || npc.answered) return;
  state.currentNpc = npc;
  var levelQuestions = allQuestions.filter(function(q) { return q.level <= npc.level + 2; });
  var pool = levelQuestions.length > 0 ? levelQuestions : allQuestions;
  state.currentQuestion = pool[Math.floor(Math.random() * pool.length)];
  showQuestion();
}

// ============================================================
// QUESTION SYSTEM
// ============================================================

function showQuestion() {
  var q = state.currentQuestion;
  var npc = state.currentNpc;
  if(!q || !npc) return;
  state.answered = false;
  document.getElementById('qNpcIcon').textContent = npc.type;
  document.getElementById('qNpcName').textContent = npc.name + ' Lv.' + npc.level;
  document.getElementById('qText').innerHTML = q.question.replace('___', '<span class="blank">___</span>');
  var optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';
  q.options.forEach(function(opt, i) {
    var btn = document.createElement('button');
    btn.className = 'q-option';
    btn.textContent = String.fromCharCode(65+i) + '. ' + opt;
    btn.onclick = (function(idx) { return function() { checkAnswer(idx); }; })(i);
    optsEl.appendChild(btn);
  });
  document.getElementById('qFeedback').className = 'q-feedback';
  document.getElementById('qCoinsEarned').textContent = '';
  document.getElementById('questionOverlay').classList.add('show');
}

function checkAnswer(idx) {
  var q = state.currentQuestion;
  var npc = state.currentNpc;
  if(!q || !npc) return;
  if(state.answered) return;
  state.answered = true;
  var isCorrect = idx === q.answer;
  var opts = document.querySelectorAll('.q-option');
  opts.forEach(function(b, i) {
    b.classList.add('disabled');
    b.onclick = null;
    if(i === q.answer) b.classList.add('correct');
    else if(i === idx && !isCorrect) b.classList.add('wrong');
  });
  var feedback = document.getElementById('qFeedback');
  var feedbackTitle = document.getElementById('qFeedbackTitle');
  var feedbackExp = document.getElementById('qFeedbackExp');
  var coinsEarned = document.getElementById('qCoinsEarned');
  if(isCorrect) {
    var coins = 5 + npc.level * 2;
    var xp = 10 + npc.level * 5;
    state.coins += coins;
    state.xp += xp;
    state.score++;
    state.answered++;
    npc.answered = true;
    state.answeredNpcs.add(npc.id);
    feedback.className = 'q-feedback show correct';
    feedbackTitle.textContent = '✅ 答對了！';
    feedbackExp.textContent = q.explanation;
    coinsEarned.textContent = '+' + coins + ' 🪙  +' + xp + ' ⚡ XP';
    var npcEl = document.getElementById('npc_' + npc.id);
    if(npcEl) npcEl.classList.add('answered');
    showFloatText('+' + coins + ' 🪙', 'gold');
    updateHud();
    if(state.answeredNpcs.size >= state.npcs.length) {
      setTimeout(function() {
        showFloatText('🎉 全部完成！新一輪開始！', 'gold');
        resetAllNpcs();
      }, 1500);
    }
  } else {
    feedback.className = 'q-feedback show wrong';
    feedbackTitle.textContent = '❌ 答錯了';
    feedbackExp.textContent = q.explanation;
    coinsEarned.textContent = '';
    showFloatText('再試過！', 'red');
  }
  setTimeout(function() {
    document.getElementById('questionOverlay').classList.remove('show');
    state.currentNpc = null;
    state.currentQuestion = null;
  }, 2500);
}

function resetAllNpcs() {
  state.answeredNpcs.clear();
  state.answered = 0;
  state.npcs = [];
  document.querySelectorAll('.npc').forEach(function(el) { el.remove(); });
  allQuestions = generateQuestions();
  placeNpcs();
  updateHud();
}

function confirmReset() {
  if(confirm('確定要重置角色嗎？\n\n金幣、裝備、進度都會清除！')) {
    resetGame();
  }
}

function resetGame() {
  localStorage.removeItem('grammarQuestSave');
  state.coins = 0;
  state.xp = 0;
  state.score = 0;
  state.answered = 0;
  state.playerCol = 20;
  state.playerRow = 15;
  state.equipped = {hat:'hat_0',body:'body_0',pants:'pants_0',shoes:'shoes_0',weapon:'weapon_0',cape:'cape_0'};
  state.owned = ['hat_0','body_0','pants_0','shoes_0','weapon_0','cape_0'];
  state.answeredNpcs.clear();
  state.npcs = [];
  state.currentNpc = null;
  state.currentQuestion = null;
  document.querySelectorAll('.npc').forEach(function(el) { el.remove(); });
  document.getElementById('questionOverlay').classList.remove('show');
  allQuestions = generateQuestions();
  buildMap();
  movePlayer(state.playerCol, state.playerRow);
  updateCharacterDisplay();
  updateHud();
  showFloatText('🔄 角色已重置！', 'gold');
}

// ============================================================
// SHOP
// ============================================================

function openShop() {
  const panel = document.getElementById('shopPanel');
  const content = document.getElementById('shopContent');
  document.getElementById('shopCoins').textContent = state.coins;

  let html = '';
  const categories = [
    {key:'hat', name:'🎩 帽子'},
    {key:'body', name:'👕 上衣'},
    {key:'pants', name:'🩳 褲子'},
    {key:'shoes', name:'👟 鞋子'},
    {key:'weapon', name:'⚔️ 武器'},
    {key:'cape', name:'🧣 披風'},
  ];

  categories.forEach(cat => {
    html += `<div class="shop-category">${cat.name}</div><div class="shop-grid">`;
    EQUIPMENT[cat.key].forEach(item => {
      const owned = state.owned.includes(item.id);
      html += `<div class="shop-item ${owned ? 'owned' : ''}" onclick="buyItem('${cat.key}','${item.id}')">
        <div class="item-icon">${item.icon || '➖'}</div>
        <div class="item-name">${item.name}</div>
        <div class="item-price">${owned ? '已擁有' : item.price + ' 🪙'}</div>
      </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
  panel.classList.add('show');
}

function closeShop() {
  document.getElementById('shopPanel').classList.remove('show');
}

function buyItem(category, itemId) {
  if(state.owned.includes(itemId)) return;

  const item = EQUIPMENT[category].find(i => i.id === itemId);
  if(!item) return;

  if(state.coins < item.price) {
    alert('金幣不足！');
    return;
  }

  state.coins -= item.price;
  state.owned.push(itemId);
  document.getElementById('shopCoins').textContent = state.coins;
  updateHud();

  // Refresh shop
  openShop();
  showFloatText(`買到 ${item.name}！`, 'gold');
}

// ============================================================
// INVENTORY
// ============================================================

function openInventory() {
  const panel = document.getElementById('inventoryPanel');
  const content = document.getElementById('invContent');

  let html = '';
  const categories = [
    {key:'hat', name:'🎩 帽子'},
    {key:'body', name:'👕 上衣'},
    {key:'pants', name:'🩳 褲子'},
    {key:'shoes', name:'👟 鞋子'},
    {key:'weapon', name:'⚔️ 武器'},
    {key:'cape', name:'🧣 披風'},
  ];

  categories.forEach(cat => {
    html += `<div class="shop-category">${cat.name}</div><div class="inv-grid">`;
    EQUIPMENT[cat.key].forEach(item => {
      const owned = state.owned.includes(item.id);
      const equipped = state.equipped[cat.key] === item.id;
      if(!owned) return;
      html += `<div class="inv-item ${equipped ? 'equipped' : ''}" onclick="equipItem('${cat.key}','${item.id}')">
        <div class="item-icon">${item.icon || '➖'}</div>
        <div class="item-name">${item.name}</div>
      </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
  panel.classList.add('show');
}

function closeInventory() {
  document.getElementById('inventoryPanel').classList.remove('show');
}

function equipItem(category, itemId) {
  if(!state.owned.includes(itemId)) return;

  state.equipped[category] = itemId;
  updateCharacterDisplay();
  openInventory(); // refresh
}

function updateCharacterDisplay() {
  const layers = ['hat','body','pants','shoes','weapon','cape'];
  layers.forEach(layer => {
    const el = document.getElementById('char' + layer.charAt(0).toUpperCase() + layer.slice(1));
    if(!el) return;
    const itemId = state.equipped[layer];
    const item = EQUIPMENT[layer].find(i => i.id === itemId);
    if(item && item.icon) {
      el.textContent = item.icon;
      el.style.display = 'flex';
    } else {
      el.textContent = '';
      el.style.display = 'none';
    }
  });
}

// ============================================================
// HUD & UTILITIES
// ============================================================

function updateHud() {
  document.getElementById('coinDisplay').textContent = state.coins;
  document.getElementById('xpDisplay').textContent = state.xp;
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('answeredDisplay').textContent = state.answered;
}

function showFloatText(text, type) {
  const el = document.createElement('div');
  el.className = `float-text float-${type}`;
  el.textContent = text;
  // Use grid coordinates for positioning
  const pos = gridToScreen(state.playerCol, state.playerRow);
  const worldMap = document.getElementById('worldMap');
  const vw = worldMap.clientWidth;
  const vh = worldMap.clientHeight;
  const camX = pos.x - vw / 2;
  const camY = pos.y - vh / 2;
  el.style.left = (pos.x - camX - 30) + 'px';
  el.style.top = (pos.y - camY - 40) + 'px';
  document.getElementById('worldMap').appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

// ============================================================
// GAME START
// ============================================================

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');

  // Load saved state
  loadGame();

  // Generate questions
  allQuestions = generateQuestions();

  // Build map
  buildMap();

  // Place player
  movePlayer(state.playerCol, state.playerRow);

  // Update character
  updateCharacterDisplay();

  // Update HUD
  updateHud();

  // Auto-save periodically
  setInterval(saveGame, 30000);
}

// ============================================================
// SAVE / LOAD
// ============================================================

function saveGame() {
  const save = {
    coins: state.coins,
    xp: state.xp,
    score: state.score,
    answered: state.answered,
    playerCol: state.playerCol,
    playerRow: state.playerRow,
    equipped: state.equipped,
    owned: state.owned,
    answeredNpcs: Array.from(state.answeredNpcs),
  };
  localStorage.setItem('grammarQuestSave', JSON.stringify(save));
}

function loadGame() {
  try {
    const save = JSON.parse(localStorage.getItem('grammarQuestSave'));
    if(save) {
      state.coins = save.coins || 0;
      state.xp = save.xp || 0;
      state.score = save.score || 0;
      state.answered = save.answered || 0;
      state.playerCol = save.playerCol || 20;
      state.playerRow = save.playerRow || 15;
      state.equipped = save.equipped || state.equipped;
      state.owned = save.owned || state.owned;
      state.answeredNpcs = new Set(save.answeredNpcs || []);
    }
  } catch(e) {}
}

// ============================================================
// INIT
// ============================================================

// Preload
allQuestions = generateQuestions();
</script>
</body>
</html>
